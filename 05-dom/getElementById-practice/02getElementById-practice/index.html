<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Intermediate Practice</title>
</head>
<body>

  <h1>DOM Intermediate Practice</h1>

  <!-- Input + Output -->
  <input type="text" id="inputField" placeholder="Enter text">
  <button id="addBtn">Add Text</button>
  <button id="clearBtn">Clear Input</button>
  <p id="output"></p>

  <hr>

  <button id="colorBtn">Change Background</button>

  <hr>

  <!-- Counter -->
  <button id="countBtn">Click Counter</button>
  <p id="clickCount">0</p>

  <hr>

  <!-- Box -->
  <div id="box">Box Element</div>
  <button id="toggleBtn">Toggle Box</button>

  <hr>

  <!-- List -->
  <ul id="list"></ul>
  <button id="removeLast">Remove Last Item</button>
  <button id="clearList">Clear List</button>

  <hr>

  <!-- Image Toggle -->
  <img id="image" src="https://via.placeholder.com/150" width="150">
  
  <hr>

  <!-- Paragraph Container -->
  <div id="container">
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
  </div>

  <hr>

  <!-- Date & Time -->
  <button id="timeBtn">Show Time</button>
  <p id="time"></p>

  <hr>

  <!-- Character Counter -->
  <input type="text" id="charInput" placeholder="Type something">
  <p id="charCount">0</p>

  <hr>

  <!-- Buttons for enable/disable -->
  <button id="disableBtn">Disable Me</button>
  <button id="enableBtn">Enable Button</button>

  <hr>

  <!-- Scroll -->
  <button id="scrollTopBtn">Scroll to Top</button>

  <script src="index.js"></script>

</body>
</html>
